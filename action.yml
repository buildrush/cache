name: 'Build_Rush Cache'
description: 'Drop-in replacement for actions/cache@v5 backed by Build_Rush.'
branding:
  icon: archive
  color: purple
inputs:
  path:
    description: 'A list of files, directories, and wildcard patterns to cache and restore'
    required: true
  key:
    description: 'An explicit key for restoring and saving the cache'
    required: true
  restore-keys:
    description: 'An ordered multiline string listing the prefix-matched keys, that are used for restoring stale cache if no cache hit occurred for key. Note `cache-hit` returns false in this case.'
    required: false
  upload-chunk-size:
    description: 'The chunk size used to split up large files during upload, in bytes'
    required: false
  enableCrossOsArchive:
    description: 'An optional boolean when enabled, allows windows runners to save or restore caches that can be restored or saved respectively on other platforms'
    default: 'false'
    required: false
  fail-on-cache-miss:
    description: 'Fail the workflow if cache entry is not found'
    default: 'false'
    required: false
  lookup-only:
    description: 'Check if a cache entry exists for the given input(s) (key, restore-keys) without downloading the cache'
    default: 'false'
    required: false
  audience:
    description: 'OIDC audience to mint. Defaults to https://cache.buildrush.io (production cache service).'
    required: false
    default: 'https://cache.buildrush.io'
  fallback:
    description: 'Build_Rush fallback policy when cache service is unavailable: github (default) | skip | fail.'
    required: false
    default: 'github'
  compression:
    description: 'Build_Rush-specific. Compression for the cache archive: zstd-fast (default, fastest) | zstd (balanced, better ratio) | none (store uncompressed). zstd-fast and zstd interoperate within a key; none uses a separate cache namespace.'
    required: false
    default: 'zstd-fast'
  verbose:
    description: 'Build_Rush-specific. Print debug-level diagnostics to the step log (HTTP statuses, retries, telemetry outcome). Defaults to false.'
    required: false
    default: 'false'
outputs:
  cache-hit:
    description: 'A boolean value to indicate an exact match was found for the primary key'
  buildrush-reason:
    description: 'Build_Rush fallback reason code (empty string if the cache service was reached successfully).'
runs:
  using: 'node24'
  main: 'dist/restore/index.js'
  post: 'dist/save/index.js'
  post-if: 'success()'
