    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with: { name: dist-bundle, path: dist }
      - id: get-version
        name: Stub R version outputs
        run: |
          echo "os-version=Ubuntu 24.04" >> $GITHUB_OUTPUT
          echo "r-version=R 4.4.0" >> $GITHUB_OUTPUT
      - name: Seed renv.lock (hash A)
        run: echo '{"R":{"Version":"A"}}' > renv.lock
      - name: Seed cache payload
        run: |
          mkdir -p "$RENV_PATHS_ROOT"
          echo "marker-$GITHUB_RUN_ID-A" > "$RENV_PATHS_ROOT/stamp"
      - name: Save
        uses: ./save
        with:
          audience: https://cache.buildrush.dev
          path: ${{ env.RENV_PATHS_ROOT }}
          key: ${{ env.KEY_NS }}${{ steps.get-version.outputs.os-version }}-${{ steps.get-version.outputs.r-version }}-v0-${{ hashFiles('renv.lock') }}
      - name: Wipe
        run: rm -rf "$RENV_PATHS_ROOT"
      - id: restore-positive
        uses: ./restore
        with:
          audience: https://cache.buildrush.dev
          path: ${{ env.RENV_PATHS_ROOT }}
          key: ${{ env.KEY_NS }}${{ steps.get-version.outputs.os-version }}-${{ steps.get-version.outputs.r-version }}-v0-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ env.KEY_NS }}${{ steps.get-version.outputs.os-version }}-${{ steps.get-version.outputs.r-version }}-v0-
      - name: Assert hit + record primary
        env:
          HIT: ${{ steps.restore-positive.outputs.cache-hit }}
          MATCHED: ${{ steps.restore-positive.outputs.cache-matched-key }}
        run: |
          test "$HIT" = "true" || { echo "expected hit, got $HIT"; exit 1; }
          grep -q "marker-$GITHUB_RUN_ID-A" "$RENV_PATHS_ROOT/stamp" || { echo "bytes mismatch"; exit 1; }
          echo "PRIOR_PRIMARY=$MATCHED" >> "$GITHUB_ENV"
      - name: Bump renv.lock to B
        run: echo '{"R":{"Version":"B"}}' > renv.lock
      - run: rm -rf "$RENV_PATHS_ROOT"
      - id: restore-fallback
        uses: ./restore
        with:
          audience: https://cache.buildrush.dev
          path: ${{ env.RENV_PATHS_ROOT }}
          key: ${{ env.KEY_NS }}${{ steps.get-version.outputs.os-version }}-${{ steps.get-version.outputs.r-version }}-v0-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ env.KEY_NS }}${{ steps.get-version.outputs.os-version }}-${{ steps.get-version.outputs.r-version }}-v0-
      - name: Assert fallback
        env:
          HIT: ${{ steps.restore-fallback.outputs.cache-hit }}
          MATCHED: ${{ steps.restore-fallback.outputs.cache-matched-key }}
        run: |
          test "$HIT" = "false" || { echo "expected miss"; exit 1; }
          test "$MATCHED" = "$PRIOR_PRIMARY" || { echo "matched != prior primary"; exit 1; }
          grep -q "marker-$GITHUB_RUN_ID-A" "$RENV_PATHS_ROOT/stamp" || { echo "bytes mismatch"; exit 1; }
