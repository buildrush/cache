        uses: ./save
        with:
          audience: https://cache.buildrush.dev
          path: .stack-work
          key: ${{ env.KEY_NS }}${{ runner.os }}-stack-work-${{ hashFiles('stack.yaml') }}-${{ hashFiles('package.yaml') }}-${{ hashFiles('**/*.hs') }}
