    env:
      BUILDRUSH_CACHE_URL: ${{ vars.BUILDRUSH_CACHE_STAGING_URL }}
      KEY_NS: compat-${{ github.run_id }}-${{ github.run_attempt }}-
      # Upstream example uses ${{ runner.temp }}/renv but the `runner` context
