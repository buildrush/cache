        with: { name: dist-bundle, path: dist }
      - id: pip-cache
        name: Stub pip cache directory
        # Upstream cmd-shell example expects `pip cache dir` to emit a native
        # Windows path (e.g. C:\Users\runneradmin\AppData\Local\pip\Cache). We
        # synthesize the same form here so the action sees a real path it can
        # resolve on Windows — not the Git Bash MSYS form (/c/Users/...).
        run: |
          mkdir -p "$HOME/AppData/Local/pip/Cache"
          echo "dir=$(cygpath -w "$HOME/AppData/Local/pip/Cache")" >> $GITHUB_OUTPUT
      - name: Seed requirements.txt
        run: echo 'flask==3.0.0' > requirements.txt
      - name: Seed cache payload
        run: echo "marker-$GITHUB_RUN_ID-A" > "$HOME/AppData/Local/pip/Cache/stamp"
      - name: Save
        uses: ./save
        with:
          audience: https://cache.buildrush.dev
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ env.KEY_NS }}${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      - name: Wipe
        run: rm -rf "$HOME/AppData/Local/pip/Cache"
      - id: restore-positive
        uses: ./restore
        with:
          audience: https://cache.buildrush.dev
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ env.KEY_NS }}${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ env.KEY_NS }}${{ runner.os }}-pip-
      - name: Assert hit + record primary
        env:
          HIT: ${{ steps.restore-positive.outputs.cache-hit }}
          MATCHED: ${{ steps.restore-positive.outputs.cache-matched-key }}
        run: |
          test "$HIT" = "true" || { echo "expected hit"; exit 1; }
          grep -q "marker-$GITHUB_RUN_ID-A" "$HOME/AppData/Local/pip/Cache/stamp" || { echo "bytes mismatch"; exit 1; }
          echo "PRIOR_PRIMARY=$MATCHED" >> "$GITHUB_ENV"
      - name: Bump requirements.txt to B
        run: echo 'flask==3.0.1' > requirements.txt
      - run: rm -rf "$HOME/AppData/Local/pip/Cache"
      - id: restore-fallback
        uses: ./restore
        with:
          audience: https://cache.buildrush.dev
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ env.KEY_NS }}${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ env.KEY_NS }}${{ runner.os }}-pip-
      - name: Assert fallback
        env:
          HIT: ${{ steps.restore-fallback.outputs.cache-hit }}
          MATCHED: ${{ steps.restore-fallback.outputs.cache-matched-key }}
        run: |
          test "$HIT" = "false" || { echo "expected miss"; exit 1; }
          test "$MATCHED" = "$PRIOR_PRIMARY" || { echo "matched != prior primary"; exit 1; }
          grep -q "marker-$GITHUB_RUN_ID-A" "$HOME/AppData/Local/pip/Cache/stamp" || { echo "bytes mismatch"; exit 1; }

