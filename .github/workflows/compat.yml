name: compat

# Run every actions/cache example as a save/restore round-trip against staging.
# Each job's `with:` block is verbatim from actions/cache/examples.md, with two
# allowed mods: (1) uses: actions/cache@v5 → uses: ./save and ./restore, (2)
# KEY_NS prefix injected into key/restore-keys for cross-PR isolation.
#
# Synthetic seeding only — no real toolchain installs. The compat surface we
# test is the action's input shape, not each ecosystem's tool finding the
# cache. End-to-end coverage stays in self-test.yml.

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'restore/src/**'
      - 'save/src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'action.yml'
      - 'restore/action.yml'
      - 'save/action.yml'
      - '.github/workflows/compat.yml'

concurrency:
  group: compat-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

# Verbose across the whole repo's CI: surfaces the action's debug diagnostics
# (HTTP statuses, retries, telemetry outcome) in every job log. Set via env
# rather than per-step `with:` so the compat jobs' `with:` blocks stay verbatim
# from the upstream actions/cache examples (see the header note above).
env:
  BUILDRUSH_CACHE_VERBOSE: "true"

jobs:
  build-dist:
    name: Build dist for testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: dist-bundle
          path: dist

  java-maven:
    name: 'compat: Java Maven'
    needs: build-dist
    runs-on: ubuntu-latest
    permissions: { id-token: write, contents: read }
    env:
      BUILDRUSH_CACHE_URL: ${{ vars.BUILDRUSH_CACHE_STAGING_URL }}
      KEY_NS: compat-${{ github.run_id }}-${{ github.run_attempt }}-
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with: { name: dist-bundle, path: dist }
      - name: Seed pom.xml (hash A)
        run: echo '<project><version>A</version></project>' > pom.xml
      - name: Seed cache payload
        run: |
          mkdir -p "$HOME/.m2/repository"
          echo "marker-$GITHUB_RUN_ID-A" > "$HOME/.m2/repository/stamp"
      - name: Save (lockfile = hash A)
        uses: ./save
        with:
          audience: https://cache.buildrush.dev
          path: |
            ~/.m2/repository
          key: ${{ env.KEY_NS }}${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
      - name: Wipe cache directories
        run: rm -rf "$HOME/.m2/repository"
      - id: restore-positive
        uses: ./restore
        with:
          audience: https://cache.buildrush.dev
          path: |
            ~/.m2/repository
          key: ${{ env.KEY_NS }}${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ env.KEY_NS }}${{ runner.os }}-maven-
      - name: Assert exact hit + record primary
        env:
          HIT: ${{ steps.restore-positive.outputs.cache-hit }}
          MATCHED: ${{ steps.restore-positive.outputs.cache-matched-key }}
        run: |
          test "$HIT" = "true" || { echo "expected hit, got $HIT"; exit 1; }
          test -n "$MATCHED" || { echo "matched-key empty"; exit 1; }
          grep -q "marker-$GITHUB_RUN_ID-A" "$HOME/.m2/repository/stamp" \
            || { echo "bytes mismatch on positive restore"; exit 1; }
          echo "PRIOR_PRIMARY=$MATCHED" >> "$GITHUB_ENV"
      - name: Bump pom.xml to hash B
        run: echo '<project><version>B</version></project>' > pom.xml
      - name: Wipe cache directories again
        run: rm -rf "$HOME/.m2/repository"
      - id: restore-fallback
        uses: ./restore
        with:
          audience: https://cache.buildrush.dev
          path: |
            ~/.m2/repository
          key: ${{ env.KEY_NS }}${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ env.KEY_NS }}${{ runner.os }}-maven-
      - name: Assert prefix-fallback (miss + matched == prior primary)
        env:
          HIT: ${{ steps.restore-fallback.outputs.cache-hit }}
          MATCHED: ${{ steps.restore-fallback.outputs.cache-matched-key }}
        run: |
          test "$HIT" = "false" || { echo "expected miss on bumped key, got $HIT"; exit 1; }
          test "$MATCHED" = "$PRIOR_PRIMARY" \
            || { echo "expected matched=$PRIOR_PRIMARY, got $MATCHED"; exit 1; }
          grep -q "marker-$GITHUB_RUN_ID-A" "$HOME/.m2/repository/stamp" \
            || { echo "fallback restored wrong bytes"; exit 1; }

  bun-linux:
    name: 'compat: Bun (Linux)'
    needs: build-dist
    runs-on: ubuntu-latest
    permissions: { id-token: write, contents: read }
    env:
      BUILDRUSH_CACHE_URL: ${{ vars.BUILDRUSH_CACHE_STAGING_URL }}
      KEY_NS: compat-${{ github.run_id }}-${{ github.run_attempt }}-
    defaults: { run: { shell: bash } }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with: { name: dist-bundle, path: dist }
      - name: Seed bun.lock
        run: echo '{"lockfileVersion":1,"workspaces":{},"packages":{}}' > bun.lock
      - name: Seed cache payload
        run: |
          mkdir -p "$HOME/.bun/install/cache"
          echo "marker-$GITHUB_RUN_ID" > "$HOME/.bun/install/cache/stamp"
      - name: Save
        uses: ./save
        with:
          audience: https://cache.buildrush.dev
          path: |
            ~/.bun/install/cache
          key: ${{ env.KEY_NS }}${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
      - name: Wipe
        run: rm -rf "$HOME/.bun/install/cache"
      - id: restore
        uses: ./restore
        with:
          audience: https://cache.buildrush.dev
          path: |
            ~/.bun/install/cache
          key: ${{ env.KEY_NS }}${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
      - name: Assert exact hit + bytes
        env:
          HIT: ${{ steps.restore.outputs.cache-hit }}
          MATCHED: ${{ steps.restore.outputs.cache-matched-key }}
        run: |
          test "$HIT" = "true" || { echo "expected hit, got $HIT"; exit 1; }
          test -n "$MATCHED" || { echo "matched-key empty"; exit 1; }
          grep -q "marker-$GITHUB_RUN_ID" "$HOME/.bun/install/cache/stamp" \
            || { echo "bytes mismatch"; exit 1; }

  bun-windows:
    name: 'compat: Bun (Windows)'
    needs: build-dist
    runs-on: windows-latest
    permissions: { id-token: write, contents: read }
    env:
      BUILDRUSH_CACHE_URL: ${{ vars.BUILDRUSH_CACHE_STAGING_URL }}
      KEY_NS: compat-${{ github.run_id }}-${{ github.run_attempt }}-
    defaults: { run: { shell: bash } }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with: { name: dist-bundle, path: dist }
      - name: Seed bun.lock
        run: echo '{"lockfileVersion":1,"workspaces":{},"packages":{}}' > bun.lock
      - name: Seed cache payload
        run: |
          mkdir -p "$HOME/.bun"
          echo "marker-$GITHUB_RUN_ID" > "$HOME/.bun/stamp"
      - name: Save
        uses: ./save
        with:
          audience: https://cache.buildrush.dev
          path: |
            ~\.bun
          key: ${{ env.KEY_NS }}${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
      - name: Wipe
        run: rm -rf "$HOME/.bun"
      - id: restore
        uses: ./restore
        with:
          audience: https://cache.buildrush.dev
          path: |
            ~\.bun
          key: ${{ env.KEY_NS }}${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
      - name: Assert exact hit + bytes
        env:
          HIT: ${{ steps.restore.outputs.cache-hit }}
          MATCHED: ${{ steps.restore.outputs.cache-matched-key }}
        run: |
          test "$HIT" = "true" || { echo "expected hit, got $HIT"; exit 1; }
          test -n "$MATCHED" || { echo "matched-key empty"; exit 1; }
          grep -q "marker-$GITHUB_RUN_ID" "$HOME/.bun/stamp" \
            || { echo "bytes mismatch"; exit 1; }

  deno-linux:
    name: 'compat: Deno (Linux)'
    needs: build-dist
    runs-on: ubuntu-latest
    permissions: { id-token: write, contents: read }
    env:
      BUILDRUSH_CACHE_URL: ${{ vars.BUILDRUSH_CACHE_STAGING_URL }}
      KEY_NS: compat-${{ github.run_id }}-${{ github.run_attempt }}-
    defaults: { run: { shell: bash } }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with: { name: dist-bundle, path: dist }
      - name: Seed deps.ts
        run: echo 'export const VERSION = "A";' > deps.ts
      - name: Seed cache payloads
        run: |
          mkdir -p "$HOME/.deno" "$HOME/.cache/deno"
          echo "marker-deno-$GITHUB_RUN_ID" > "$HOME/.deno/stamp"
          echo "marker-cache-$GITHUB_RUN_ID" > "$HOME/.cache/deno/stamp"
      - name: Save
        uses: ./save
        with:
          audience: https://cache.buildrush.dev
          path: |
            ~/.deno
            ~/.cache/deno
          key: ${{ env.KEY_NS }}${{ runner.os }}-deno-${{ hashFiles('**/deps.ts') }}
      - name: Wipe
        run: rm -rf "$HOME/.deno" "$HOME/.cache/deno"
      - id: restore
        uses: ./restore
        with:
          audience: https://cache.buildrush.dev
          path: |
            ~/.deno
            ~/.cache/deno
          key: ${{ env.KEY_NS }}${{ runner.os }}-deno-${{ hashFiles('**/deps.ts') }}
      - name: Assert exact hit + bytes
        env:
          HIT: ${{ steps.restore.outputs.cache-hit }}
        run: |
          test "$HIT" = "true" || { echo "expected hit, got $HIT"; exit 1; }
          grep -q "marker-deno-$GITHUB_RUN_ID" "$HOME/.deno/stamp" \
            || { echo "~/.deno bytes mismatch"; exit 1; }
          grep -q "marker-cache-$GITHUB_RUN_ID" "$HOME/.cache/deno/stamp" \
            || { echo "~/.cache/deno bytes mismatch"; exit 1; }

  deno-macos:
    name: 'compat: Deno (macOS)'
    needs: build-dist
    runs-on: macos-latest
    permissions: { id-token: write, contents: read }
    env:
      BUILDRUSH_CACHE_URL: ${{ vars.BUILDRUSH_CACHE_STAGING_URL }}
      KEY_NS: compat-${{ github.run_id }}-${{ github.run_attempt }}-
    defaults: { run: { shell: bash } }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with: { name: dist-bundle, path: dist }
      - name: Seed deps.ts
        run: echo 'export const VERSION = "A";' > deps.ts
      - name: Seed cache payloads
        run: |
          mkdir -p "$HOME/.deno" "$HOME/Library/Caches/deno"
          echo "marker-deno-$GITHUB_RUN_ID" > "$HOME/.deno/stamp"
          echo "marker-cache-$GITHUB_RUN_ID" > "$HOME/Library/Caches/deno/stamp"
      - name: Save
        uses: ./save
        with:
          audience: https://cache.buildrush.dev
          path: |
            ~/.deno
            ~/Library/Caches/deno
          key: ${{ env.KEY_NS }}${{ runner.os }}-deno-${{ hashFiles('**/deps.ts') }}
      - name: Wipe
        run: rm -rf "$HOME/.deno" "$HOME/Library/Caches/deno"
      - id: restore
        uses: ./restore
        with:
          audience: https://cache.buildrush.dev
          path: |
            ~/.deno
            ~/Library/Caches/deno
          key: ${{ env.KEY_NS }}${{ runner.os }}-deno-${{ hashFiles('**/deps.ts') }}
      - name: Assert exact hit + bytes
        env:
          HIT: ${{ steps.restore.outputs.cache-hit }}
        run: |
          test "$HIT" = "true" || { echo "expected hit, got $HIT"; exit 1; }
          grep -q "marker-deno-$GITHUB_RUN_ID" "$HOME/.deno/stamp" \
            || { echo "~/.deno bytes mismatch"; exit 1; }
          grep -q "marker-cache-$GITHUB_RUN_ID" "$HOME/Library/Caches/deno/stamp" \
            || { echo "macOS path bytes mismatch"; exit 1; }

  deno-windows:
    name: 'compat: Deno (Windows)'
    needs: build-dist
    runs-on: windows-latest
    permissions: { id-token: write, contents: read }
    env:
      BUILDRUSH_CACHE_URL: ${{ vars.BUILDRUSH_CACHE_STAGING_URL }}
      KEY_NS: compat-${{ github.run_id }}-${{ github.run_attempt }}-
    defaults: { run: { shell: bash } }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with: { name: dist-bundle, path: dist }
      - name: Seed deps.ts
        run: echo 'export const VERSION = "A";' > deps.ts
      - name: Seed cache payloads
        run: |
          mkdir -p "$HOME/.deno" "$HOME/AppData/Local/deno"
          echo "marker-deno-$GITHUB_RUN_ID" > "$HOME/.deno/stamp"
          echo "marker-appdata-$GITHUB_RUN_ID" > "$HOME/AppData/Local/deno/stamp"
      - name: Save
        uses: ./save
        with:
          audience: https://cache.buildrush.dev
          path: |
            ~\.deno
            ~\AppData\Local\deno
          key: ${{ env.KEY_NS }}${{ runner.os }}-deno-${{ hashFiles('**/deps.ts') }}
      - name: Wipe
        run: rm -rf "$HOME/.deno" "$HOME/AppData/Local/deno"
      - id: restore
        uses: ./restore
        with:
          audience: https://cache.buildrush.dev
          path: |
            ~\.deno
            ~\AppData\Local\deno
          key: ${{ env.KEY_NS }}${{ runner.os }}-deno-${{ hashFiles('**/deps.ts') }}
      - name: Assert exact hit + bytes
        env:
          HIT: ${{ steps.restore.outputs.cache-hit }}
        run: |
          test "$HIT" = "true" || { echo "expected hit, got $HIT"; exit 1; }
          grep -q "marker-deno-$GITHUB_RUN_ID" "$HOME/.deno/stamp" \
            || { echo "~/.deno bytes mismatch"; exit 1; }
          grep -q "marker-appdata-$GITHUB_RUN_ID" "$HOME/AppData/Local/deno/stamp" \
            || { echo "AppData bytes mismatch"; exit 1; }

  nuget-basic:
    name: 'compat: NuGet (basic)'
    needs: build-dist
    runs-on: ubuntu-latest
    permissions: { id-token: write, contents: read }
    env:
      BUILDRUSH_CACHE_URL: ${{ vars.BUILDRUSH_CACHE_STAGING_URL }}
      KEY_NS: compat-${{ github.run_id }}-${{ github.run_attempt }}-
    defaults: { run: { shell: bash } }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with: { name: dist-bundle, path: dist }
      - name: Seed packages.lock.json (hash A)
        run: echo '{"version":1,"hash":"A"}' > packages.lock.json
      - name: Seed cache payload
        run: |
          mkdir -p "$HOME/.nuget/packages"
          echo "marker-$GITHUB_RUN_ID-A" > "$HOME/.nuget/packages/stamp"
      - name: Save
        uses: ./save
        with:
          audience: https://cache.buildrush.dev
          path: ~/.nuget/packages
          key: ${{ env.KEY_NS }}${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
      - name: Wipe
        run: rm -rf "$HOME/.nuget/packages"
      - id: restore-positive
        uses: ./restore
        with:
          audience: https://cache.buildrush.dev
          path: ~/.nuget/packages
          key: ${{ env.KEY_NS }}${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ env.KEY_NS }}${{ runner.os }}-nuget-
      - name: Assert hit + record primary
        env:
          HIT: ${{ steps.restore-positive.outputs.cache-hit }}
          MATCHED: ${{ steps.restore-positive.outputs.cache-matched-key }}
        run: |
          test "$HIT" = "true" || { echo "expected hit"; exit 1; }
          grep -q "marker-$GITHUB_RUN_ID-A" "$HOME/.nuget/packages/stamp" || { echo "bytes mismatch"; exit 1; }
          echo "PRIOR_PRIMARY=$MATCHED" >> "$GITHUB_ENV"
      - name: Bump packages.lock.json to B
        run: echo '{"version":1,"hash":"B"}' > packages.lock.json
      - run: rm -rf "$HOME/.nuget/packages"
      - id: restore-fallback
        uses: ./restore
        with:
          audience: https://cache.buildrush.dev
          path: ~/.nuget/packages
          key: ${{ env.KEY_NS }}${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ env.KEY_NS }}${{ runner.os }}-nuget-
      - name: Assert fallback
        env:
          HIT: ${{ steps.restore-fallback.outputs.cache-hit }}
          MATCHED: ${{ steps.restore-fallback.outputs.cache-matched-key }}
        run: |
          test "$HIT" = "false" || { echo "expected miss"; exit 1; }
          test "$MATCHED" = "$PRIOR_PRIMARY" || { echo "matched != prior primary"; exit 1; }
          grep -q "marker-$GITHUB_RUN_ID-A" "$HOME/.nuget/packages/stamp" || { echo "bytes mismatch"; exit 1; }

  nuget-exclusions:
    name: 'compat: NuGet (with exclusions)'
    needs: build-dist
    runs-on: ubuntu-latest
    permissions: { id-token: write, contents: read }
    env:
      BUILDRUSH_CACHE_URL: ${{ vars.BUILDRUSH_CACHE_STAGING_URL }}
      KEY_NS: compat-${{ github.run_id }}-${{ github.run_attempt }}-
    defaults: { run: { shell: bash } }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with: { name: dist-bundle, path: dist }
      - name: Seed packages.lock.json (hash A)
        run: echo '{"version":1,"hash":"A"}' > packages.lock.json
      - name: Seed BOTH wanted and unwanted under cache dir
        run: |
          mkdir -p "$HOME/.nuget/packages/wanted" "$HOME/.nuget/packages/unwanted"
          echo "kept-$GITHUB_RUN_ID" > "$HOME/.nuget/packages/wanted/file"
          echo "excluded-$GITHUB_RUN_ID" > "$HOME/.nuget/packages/unwanted/file"
      - name: Save (with ! exclusion)
        uses: ./save
        with:
          audience: https://cache.buildrush.dev
          path: |
            ~/.nuget/packages
            !~/.nuget/packages/unwanted
          key: ${{ env.KEY_NS }}${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
      - name: Wipe
        run: rm -rf "$HOME/.nuget/packages"
      - id: restore-positive
        uses: ./restore
        with:
          audience: https://cache.buildrush.dev
          path: |
            ~/.nuget/packages
            !~/.nuget/packages/unwanted
          key: ${{ env.KEY_NS }}${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ env.KEY_NS }}${{ runner.os }}-nuget-
      - name: Assert hit + wanted present + unwanted absent
        env:
          HIT: ${{ steps.restore-positive.outputs.cache-hit }}
          MATCHED: ${{ steps.restore-positive.outputs.cache-matched-key }}
        run: |
          test "$HIT" = "true" || { echo "expected hit, got $HIT"; exit 1; }
          test -f "$HOME/.nuget/packages/wanted/file" || { echo "wanted/file missing after restore"; exit 1; }
          grep -q "kept-$GITHUB_RUN_ID" "$HOME/.nuget/packages/wanted/file" || { echo "wanted/file bytes mismatch"; exit 1; }
          test ! -e "$HOME/.nuget/packages/unwanted/file" || { echo "unwanted/file should not be restored (exclusion failed)"; exit 1; }
          echo "PRIOR_PRIMARY=$MATCHED" >> "$GITHUB_ENV"
      - name: Bump packages.lock.json to B
        run: echo '{"version":1,"hash":"B"}' > packages.lock.json
      - run: rm -rf "$HOME/.nuget/packages"
      - id: restore-fallback
        uses: ./restore
        with:
          audience: https://cache.buildrush.dev
          path: |
            ~/.nuget/packages
            !~/.nuget/packages/unwanted
          key: ${{ env.KEY_NS }}${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ env.KEY_NS }}${{ runner.os }}-nuget-
      - name: Assert fallback + exclusion preserved
        env:
          HIT: ${{ steps.restore-fallback.outputs.cache-hit }}
          MATCHED: ${{ steps.restore-fallback.outputs.cache-matched-key }}
        run: |
          test "$HIT" = "false" || { echo "expected miss"; exit 1; }
          test "$MATCHED" = "$PRIOR_PRIMARY" || { echo "matched != prior primary"; exit 1; }
          test -f "$HOME/.nuget/packages/wanted/file" || { echo "wanted/file missing on fallback restore"; exit 1; }
          test ! -e "$HOME/.nuget/packages/unwanted/file" || { echo "unwanted/file should not be present on fallback restore"; exit 1; }

  nuget-custom-location:
    name: 'compat: NuGet (custom location)'
    needs: build-dist
    runs-on: ubuntu-latest
    permissions: { id-token: write, contents: read }
    env:
      BUILDRUSH_CACHE_URL: ${{ vars.BUILDRUSH_CACHE_STAGING_URL }}
      KEY_NS: compat-${{ github.run_id }}-${{ github.run_attempt }}-
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    defaults: { run: { shell: bash } }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with: { name: dist-bundle, path: dist }
      - name: Seed packages.lock.json (hash A)
        run: echo '{"version":1,"hash":"A"}' > packages.lock.json
      - name: Seed cache payload
        run: |
          mkdir -p "${{ github.workspace }}/.nuget/packages"
          echo "marker-$GITHUB_RUN_ID-A" > "${{ github.workspace }}/.nuget/packages/stamp"
      - name: Save
        uses: ./save
        with:
          audience: https://cache.buildrush.dev
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ env.KEY_NS }}${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
      - name: Wipe
        run: rm -rf "${{ github.workspace }}/.nuget/packages"
      - id: restore-positive
        uses: ./restore
        with:
          audience: https://cache.buildrush.dev
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ env.KEY_NS }}${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ env.KEY_NS }}${{ runner.os }}-nuget-
      - name: Assert hit + bytes + record primary
        env:
          HIT: ${{ steps.restore-positive.outputs.cache-hit }}
          MATCHED: ${{ steps.restore-positive.outputs.cache-matched-key }}
        run: |
          test "$HIT" = "true" || { echo "expected hit"; exit 1; }
          grep -q "marker-$GITHUB_RUN_ID-A" "${{ github.workspace }}/.nuget/packages/stamp" || { echo "bytes mismatch"; exit 1; }
          echo "PRIOR_PRIMARY=$MATCHED" >> "$GITHUB_ENV"
      - name: Bump packages.lock.json to B
        run: echo '{"version":1,"hash":"B"}' > packages.lock.json
      - run: rm -rf "${{ github.workspace }}/.nuget/packages"
      - id: restore-fallback
        uses: ./restore
        with:
          audience: https://cache.buildrush.dev
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ env.KEY_NS }}${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ env.KEY_NS }}${{ runner.os }}-nuget-
      - name: Assert fallback
        env:
          HIT: ${{ steps.restore-fallback.outputs.cache-hit }}
          MATCHED: ${{ steps.restore-fallback.outputs.cache-matched-key }}
        run: |
          test "$HIT" = "false" || { echo "expected miss"; exit 1; }
          test "$MATCHED" = "$PRIOR_PRIMARY" || { echo "matched != prior primary"; exit 1; }
          grep -q "marker-$GITHUB_RUN_ID-A" "${{ github.workspace }}/.nuget/packages/stamp" || { echo "bytes mismatch"; exit 1; }

  clojure-lein:
    name: 'compat: Clojure Lein'
    needs: build-dist
    runs-on: ubuntu-latest
    permissions: { id-token: write, contents: read }
