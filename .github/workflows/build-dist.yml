name: build-dist

# Triggers on both push to main (commit dist if changed) AND pull_request
# (dry-run: build, report whether dist would change, but never commit). The
# PR variant validates the workflow itself plus catches broken builds at
# review time; the push variant performs the actual dist update.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'restore/src/**'
      - 'save/src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
  pull_request:
    paths:
      - 'src/**'
      - 'restore/src/**'
      - 'save/src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'build-dist.yml'

permissions:
  contents: write

# Share the concurrency group with release-please so the two workflows
# serialize on every push to main. With cancel-in-progress: false, GitHub
# queues the second workflow as pending; if a newer push arrives mid-flight
# the older pending run is cancelled and replaced — so release-please always
# runs against the latest main, including the dist commit this workflow just
# pushed.
concurrency:
  group: main-release-flow
  cancel-in-progress: false

jobs:
  build-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Commit dist if changed
        if: github.event_name == 'push'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add dist
          if git diff --staged --quiet -- dist; then
            echo "dist tree is already up to date — nothing to commit"
            exit 0
          fi
          git commit -m "chore(dist): rebuild dist [skip ci]"
          git push

      - name: Verify dist coherence (PR dry-run)
        if: github.event_name == 'pull_request'
        run: |
          git add dist
          if git diff --staged --quiet -- dist; then
            echo "PR doesn't change dist — coherent with current main ✓"
          else
            echo "PR would update dist when merged. Preview:"
            git diff --staged --stat -- dist
          fi
